workspace = "boringcache/benchmarks"

# Archive entries that complement the maven HTTP-cache proxy mode for
# fair warm/rolling parity with actions/cache. The action's `cache-tag`
# input prefixes each entry's tag at resolution, so the proxy tag (e.g.
# spring-ai-maven-run-r123-a1-maven-remote) namespaces the archives.

[entries.deps]
tag = "maven-deps"
default_path = "~/.m2/repository"

[entries.build-cache]
tag = "maven-build-cache"
default_path = "~/.m2/build-cache"

[profiles.benchmark]
entries = ["deps", "build-cache"]
