name: "Spring AI Maven - Actions Cache"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'AC Rolling' || 'AC Fresh', github.event_name == 'push' && github.event.head_commit.message || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/spring-ai-maven-boringcache.yml"
      - ".github/workflows/spring-ai-maven-actions-cache.yml"
      - ".github/workflows/reusable-maven-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

permissions:
  contents: read
  actions: write

jobs:
  benchmark:
    uses: ./.github/workflows/reusable-maven-benchmark.yml
    with:
      benchmark_id: spring-ai-maven
      project_repo: spring-projects/spring-ai
      strategy: actions-cache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      java_version: "21"
      build_command: ./mvnw --batch-mode -ntp clean install -DskipTests -Dmaven.javadoc.skip=true
    secrets: inherit
